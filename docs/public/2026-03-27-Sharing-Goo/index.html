<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Sharing Goo</title>
    <meta name="description" content="Drop or paste URLs into a luminous reservoir and let them drift before they slowly sink away.">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main id="app" class="app-shell" tabindex="0" aria-label="Interactive reservoir for dropped or pasted links">
        <canvas id="scene" aria-hidden="true"></canvas>

        <div class="hud" aria-hidden="true">
            <section class="title-plaque">
                <p class="eyebrow">Sharing Goo</p>
                <h1>Pour a link into the well.</h1>
                <p id="hint-text" class="hint-text">Drop or paste a URL and it will drift before slowly sinking.</p>
            </section>

            <div class="control-cluster">
                <button id="paste-button" class="slate-button" type="button">Paste focus</button>
                <button id="mute-button" class="slate-button" type="button" aria-pressed="false">Sound off</button>
            </div>
        </div>

        <textarea id="paste-trap" class="sr-only" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" aria-label="Paste a URL here"></textarea>
        <p id="status" class="sr-only" aria-live="polite"></p>

        <section class="sr-only" aria-label="Stored links">
            <ul id="accessible-links"></ul>
        </section>
    </main>

    <script type="module" src="app.js"></script>
</body>
</html>
