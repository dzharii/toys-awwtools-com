<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Magnetic Reservoir</title>
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta
      name="description"
      content="A fullscreen vessel of luminous liquid that accepts dropped or pasted links and lets them drift and sink over time."
    />
    <meta name="theme-color" content="#12040f" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main
      id="app"
      tabindex="0"
      aria-label="Interactive vessel scene for dropped or pasted links"
    >
      <canvas
        id="sceneCanvas"
        aria-hidden="true"
      ></canvas>

      <textarea
        id="pasteReceiver"
        class="sr-only"
        aria-label="Paste a link into the vessel"
        autocomplete="off"
        autocorrect="off"
        autocapitalize="off"
        spellcheck="false"
      ></textarea>

      <div
        id="subtleStatus"
        aria-hidden="true"
      ></div>

      <div
        id="ambientHint"
        aria-hidden="true"
      >
        drop or paste a link
      </div>

      <div
        id="liveRegion"
        class="sr-only"
        aria-live="polite"
        aria-atomic="true"
      ></div>

      <section
        class="sr-only"
        aria-label="Stored links"
      >
        <ul id="accessibleLinks"></ul>
      </section>

      <button
        id="muteToggle"
        type="button"
        aria-pressed="false"
        aria-label="Toggle sound"
        title="Toggle sound"
      >
        sound on
      </button>
    </main>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
