<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#f4f1eb">
  <title>Bunny Volleyball</title>
  <link rel="stylesheet" href="styles.css">
  <script src="app.js" defer></script>
</head>
<body>
  <main class="page-shell" id="pageShell">
    <section
      class="scene"
      id="scene"
      aria-label="Animated scene of three rabbits in a backyard passing a beach ball. The pass counter shows the number of completed passes."
    >
      <img
        class="scene__image"
        src="assets/bunny_original.png"
        alt=""
        width="1672"
        height="941"
        draggable="false"
      >

      <div class="rabbit-anchors" id="rabbitAnchors" aria-hidden="true"></div>

      <div class="ball-shadow" id="ballShadow" aria-hidden="true"></div>

      <svg
        class="scene-effects"
        id="sceneEffects"
        viewBox="0 0 1672 941"
        preserveAspectRatio="none"
        aria-hidden="true"
      >
        <defs>
          <filter id="trailBlur" x="-20%" y="-40%" width="140%" height="180%">
            <feGaussianBlur stdDeviation="4"></feGaussianBlur>
          </filter>
        </defs>
        <path class="motion-trail motion-trail--soft" id="motionTrailSoft"></path>
        <path class="motion-trail" id="motionTrail"></path>
        <g id="impactEffects"></g>
      </svg>

      <div class="beach-ball" id="beachBall" aria-hidden="true">
        <svg viewBox="0 0 64 64" focusable="false">
          <defs>
            <clipPath id="ballClip">
              <circle cx="32" cy="32" r="29"></circle>
            </clipPath>
            <radialGradient id="ballLight" cx="28%" cy="22%" r="78%">
              <stop offset="0" stop-color="#fff" stop-opacity=".42"></stop>
              <stop offset=".58" stop-color="#fff" stop-opacity="0"></stop>
              <stop offset="1" stop-color="#5d341f" stop-opacity=".2"></stop>
            </radialGradient>
            <filter id="ballDrop" x="-30%" y="-30%" width="160%" height="170%">
              <feDropShadow dx="0" dy="2" stdDeviation="1.5" flood-color="#2e1b10" flood-opacity=".28"></feDropShadow>
            </filter>
          </defs>
          <g filter="url(#ballDrop)">
            <g clip-path="url(#ballClip)">
              <rect width="64" height="64" fill="#f7f7ef"></rect>
              <path d="M29 2C18 12 15 24 17 35c3 13 12 22 22 28L53 52C42 44 37 35 38 25c1-8 5-14 11-19z" fill="#e9542a"></path>
              <path d="M2 24c12-2 23 2 30 10 8 9 11 19 10 29H24c2-11-1-20-8-26C12 33 7 31 2 31z" fill="#f5c12e"></path>
              <path d="M35 2c3 9 2 17-3 24-6 8-16 12-29 12V21c10 2 18 0 23-6 3-4 5-8 5-13z" fill="#2f9fe3"></path>
              <circle cx="32" cy="32" r="29" fill="url(#ballLight)"></circle>
              <ellipse cx="21" cy="16" rx="8" ry="4.5" fill="#fff" opacity=".48" transform="rotate(-24 21 16)"></ellipse>
            </g>
            <circle cx="32" cy="32" r="29" fill="none" stroke="rgba(72,50,30,.42)" stroke-width="2"></circle>
            <circle cx="32" cy="32" r="5.5" fill="#fff6e1" stroke="rgba(72,50,30,.32)" stroke-width="1.5"></circle>
          </g>
        </svg>
      </div>

      <div class="score-chip" id="scoreChip" aria-hidden="true">
        <span>Passes:</span>
        <span class="score-chip__number" id="scoreNumber">000000</span>
      </div>

      <div class="audio-chip" id="audioChip" data-enabled="false">
        <button class="audio-toggle" id="audioToggle" type="button" aria-pressed="false">
          Sound Off
        </button>
        <button class="audio-volume-button" id="volumeDown" type="button" aria-label="Decrease volume">
          -
        </button>
        <output class="audio-volume-value" id="volumeValue" aria-label="Current volume">35%</output>
        <button class="audio-volume-button" id="volumeUp" type="button" aria-label="Increase volume">
          +
        </button>
      </div>

      <div class="debug-label" id="debugLabel" aria-hidden="true">B1</div>
    </section>
  </main>
</body>
</html>
