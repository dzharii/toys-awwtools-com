<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="description" content="A slot-machine-style GUID generator with a deterministic reel reveal and copy support.">
  <title>GUID Slot Machine Generator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-shell">
    <div class="scene-glow scene-glow-a" aria-hidden="true"></div>
    <div class="scene-glow scene-glow-b" aria-hidden="true"></div>
    <div class="scene-grid" aria-hidden="true"></div>

    <main class="machine" aria-labelledby="app-title">
      <header class="machine-header">
        <h1 id="app-title">GUID Slot Machine Generator</h1>
      </header>

      <section class="display-panel" aria-labelledby="display-heading">
        <div class="display-panel-flash" id="display-panel-flash" aria-hidden="true"></div>

        <div class="display-head">
          <h2 id="display-heading" class="display-heading">Current GUID</h2>
        </div>

        <div class="guid-machine" aria-hidden="true">
          <div class="guid-machine-window">
            <div class="guid-machine-bezel">
              <output id="guid-display" class="guid-reels" aria-label="GUID slot reels"></output>
            </div>
          </div>
        </div>
      </section>

      <section class="controls-panel" aria-labelledby="controls-heading">
        <h2 id="controls-heading" class="sr-only">Controls</h2>

        <div class="control-stack main-actions">
          <button id="generate-btn" class="btn btn-primary" type="button">
            <span class="btn-label">Generate GUID</span>
          </button>
          <button id="copy-btn" class="btn btn-accent" type="button" disabled>
            <span class="btn-label" id="copy-btn-label">Copy</span>
          </button>
        </div>
      </section>
    </main>
  </div>

  <div id="sr-live" class="sr-only" aria-live="polite" aria-atomic="true"></div>
  <script src="script.js" defer></script>
</body>
</html>
