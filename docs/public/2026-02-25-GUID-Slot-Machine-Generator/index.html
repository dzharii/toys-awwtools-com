<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="description" content="A slot-machine-style GUID generator with smooth animated reveal, copy, and speed controls.">
  <title>GUID Slot Machine Generator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-shell">
    <div class="ambient ambient-a" aria-hidden="true"></div>
    <div class="ambient ambient-b" aria-hidden="true"></div>
    <div class="ambient ambient-c" aria-hidden="true"></div>

    <main class="machine-panel" aria-labelledby="app-title">
      <header class="panel-header">
        <p class="eyebrow">Developer Utility / Slot Reveal</p>
        <h1 id="app-title">GUID Slot Machine Generator</h1>
        <p class="subtitle">
          Generates a valid GUID immediately, then reveals it with a controlled slot-machine spin.
        </p>
      </header>

      <section class="display-panel" aria-labelledby="display-heading">
        <div class="display-panel-flash" id="display-panel-flash" aria-hidden="true"></div>

        <div class="display-meta">
          <h2 id="display-heading" class="display-heading">Current GUID</h2>
          <div class="status-pills">
            <span class="pill" id="spin-status-pill">Idle</span>
            <span class="pill pill-subtle" id="speed-pill">Normal</span>
          </div>
        </div>

        <output id="guid-display" class="guid-display" aria-label="GUID display"></output>

        <p class="guid-textline" id="guid-textline" aria-live="off">
          xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx
        </p>
      </section>

      <section class="controls-panel" aria-labelledby="controls-heading">
        <h2 id="controls-heading" class="sr-only">Controls</h2>

        <div class="button-row button-row-main">
          <button id="generate-btn" class="btn btn-primary" type="button">
            <span class="btn-label">Generate GUID</span>
          </button>
          <button id="stop-btn" class="btn btn-secondary" type="button" disabled>
            <span class="btn-label">Reveal Now</span>
          </button>
          <button id="copy-btn" class="btn btn-accent" type="button" disabled>
            <span class="btn-label" id="copy-btn-label">Copy</span>
          </button>
        </div>

        <div class="button-row button-row-settings">
          <section class="setting-group" aria-labelledby="speed-group-label">
            <div class="setting-title-row">
              <h3 id="speed-group-label">Speed</h3>
            </div>
            <div class="segmented" role="group" aria-label="Spin speed">
              <button type="button" class="segmented-btn" data-speed="normal" aria-pressed="true">Normal</button>
              <button type="button" class="segmented-btn" data-speed="fast" aria-pressed="false">Fast</button>
              <button type="button" class="segmented-btn" data-speed="turbo" aria-pressed="false">Turbo</button>
            </div>
          </section>

          <section class="setting-group" aria-labelledby="motion-group-label">
            <div class="setting-title-row">
              <h3 id="motion-group-label">Comfort</h3>
            </div>
            <label class="toggle-row" for="reduced-motion-toggle">
              <span>Reduced motion</span>
              <input id="reduced-motion-toggle" type="checkbox">
              <span class="toggle-switch" aria-hidden="true"></span>
            </label>
          </section>
        </div>

        <p id="status-line" class="status-line" role="status" aria-live="polite">
          Ready. Press Generate GUID to spin the reels.
        </p>
      </section>
    </main>
  </div>

  <div id="sr-live" class="sr-only" aria-live="polite" aria-atomic="true"></div>
  <script src="script.js" defer></script>
</body>
</html>
