<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-labelledby="title desc">
  <title id="title">Nintendo Switch Skill Board icon</title>
  <desc id="desc">A red board tile with a cream note card and simple gamepad marks.</desc>
  <defs>
    <linearGradient id="board" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ca3d2b"/>
      <stop offset="100%" stop-color="#8d1f1c"/>
    </linearGradient>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff8ea"/>
      <stop offset="100%" stop-color="#f2e0bb"/>
    </linearGradient>
    <linearGradient id="fold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fffdf8"/>
      <stop offset="100%" stop-color="#f4e8ca"/>
    </linearGradient>
  </defs>
  <rect x="5" y="5" width="54" height="54" rx="12" fill="url(#board)"/>
  <rect x="8" y="8" width="48" height="48" rx="10" fill="none" stroke="#ffffff" stroke-opacity="0.12"/>
  <g transform="translate(33 33) rotate(-8)">
    <rect x="-16" y="-18" width="32" height="36" rx="5" fill="url(#paper)" stroke="#c69c3b" stroke-width="1"/>
    <path d="M9 -18h7v8z" fill="url(#fold)" stroke="#c69c3b" stroke-width="1" stroke-linejoin="round"/>
    <rect x="-10.5" y="-7.5" width="21" height="13" rx="6.5" fill="#fffdfa" stroke="#d4bea1" stroke-width="0.9"/>
    <circle cx="-5.2" cy="-1" r="2.3" fill="#d8312a"/>
    <circle cx="5.2" cy="-1" r="2.3" fill="#221f1a"/>
    <rect x="-8.5" y="8.5" width="17" height="2.6" rx="1.3" fill="#70543a" opacity="0.76"/>
    <rect x="-8.5" y="13.5" width="12.5" height="2.6" rx="1.3" fill="#70543a" opacity="0.5"/>
  </g>
</svg>
