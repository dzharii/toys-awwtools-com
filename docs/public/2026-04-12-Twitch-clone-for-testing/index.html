<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Twitch-like Settings Clone</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-shell" id="app" data-testid="app-shell">
    <header class="top-bar" data-testid="top-bar">
      <div class="top-left">
        <button class="icon-btn brand-btn" type="button" aria-label="Home" data-action="noop">
          <span class="brand-glyph">T</span>
        </button>
        <button class="ghost-btn" type="button" data-action="top-nav" data-nav="following">Following</button>
        <button class="ghost-btn" type="button" data-action="top-nav" data-nav="browse">Browse</button>
        <button class="icon-btn" type="button" aria-label="More" data-action="top-nav" data-nav="more">...</button>
      </div>
      <form class="search-wrap" role="search" data-testid="top-search">
        <input id="global-search" class="search-input" type="search" placeholder="Search" autocomplete="off">
        <button class="icon-btn" type="submit" aria-label="Search">Go</button>
      </form>
      <div class="top-right" data-testid="top-right-actions">
        <button class="pill-btn" type="button" data-action="show-prime">Try Prime</button>
        <button class="icon-btn" type="button" aria-label="Whispers">M</button>
        <button class="icon-btn" type="button" aria-label="Notifications" data-action="open-notifications">
          N <span class="badge" id="notif-badge">0</span>
        </button>
        <button class="icon-btn" type="button" aria-label="Get Bits">
          B <span class="badge" id="bits-badge">0</span>
        </button>
        <button class="avatar-btn" type="button" data-action="toggle-account-menu" aria-haspopup="menu" aria-expanded="false" data-testid="avatar-menu-trigger">
          <img id="top-avatar" alt="Profile avatar">
        </button>
        <div class="account-menu hidden" id="account-menu" role="menu" data-testid="account-menu">
          <button type="button" role="menuitem" data-action="route" data-route="profile">Settings</button>
          <button type="button" role="menuitem" data-action="toggle-live-mutations" data-testid="toggle-live-mutations">Toggle Live Mutations</button>
          <button type="button" role="menuitem" data-action="reset-dynamic-seed">Refresh Dynamic Seed</button>
        </div>
      </div>
    </header>

    <div class="workspace">
      <aside class="left-rail" id="left-rail" data-testid="left-rail">
        <div class="left-rail-head">
          <h2>For You</h2>
          <button class="icon-btn" type="button" data-action="toggle-rail" data-testid="toggle-left-rail" aria-label="Toggle compact rail">[]</button>
        </div>
        <div class="left-rail-scroll" id="left-rail-scroll">
          <section class="rail-group" data-group="followed">
            <div class="rail-group-header">
              <h3>Followed Channels</h3>
              <button type="button" class="text-link" data-action="show-more" data-group="followed">Show More</button>
            </div>
            <ul class="rail-list" id="followed-list"></ul>
          </section>

          <section class="rail-group" data-group="live">
            <div class="rail-group-header">
              <h3>Live Channels</h3>
              <button type="button" class="text-link" data-action="show-more" data-group="live">Show More</button>
            </div>
            <ul class="rail-list" id="live-list"></ul>
          </section>

          <section class="rail-group" data-group="categories">
            <div class="rail-group-header">
              <h3>Recommended Categories</h3>
              <button type="button" class="text-link" data-action="show-more" data-group="categories">Show More</button>
            </div>
            <ul class="rail-list" id="category-list"></ul>
          </section>

          <section class="rail-group recommendation-group" data-group="reco">
            <div class="rail-group-header">
              <h3>Recommended</h3>
            </div>
            <div class="recommendation-cards" id="recommendation-cards"></div>
          </section>
        </div>
      </aside>

      <main class="main-region" id="main-region" data-testid="main-region">
        <div class="main-scroll" id="main-scroll">
          <div class="main-header">
            <div>
              <p class="eyebrow">User Settings</p>
              <h1>Settings</h1>
            </div>
            <label class="inline-switch" for="live-mutation-toggle">
              <span>Live mutations</span>
              <button id="live-mutation-toggle" class="toggle" role="switch" type="button" aria-checked="true" data-action="toggle-live-mutations" data-testid="live-mutation-toggle"></button>
            </label>
          </div>

          <nav class="settings-tabs" id="settings-tabs" aria-label="Settings tabs" data-testid="settings-tabs"></nav>

          <section class="page-content" id="page-content" data-testid="page-content"></section>
        </div>
      </main>
    </div>
  </div>

  <input id="hidden-avatar-upload" class="hidden" type="file" accept="image/*">
  <input id="hidden-banner-upload" class="hidden" type="file" accept="image/*">

  <div id="modal-root"></div>
  <div id="toast-root" class="toast-root" aria-live="polite" aria-atomic="false"></div>

  <script src="app.js" defer></script>
</body>
</html>
