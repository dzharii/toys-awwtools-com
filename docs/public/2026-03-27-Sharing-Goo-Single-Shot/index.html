<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Magnetic Reservoir</title>
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta
      name="description"
      content="A fullscreen vessel of luminous liquid that accepts dropped or pasted links and lets them drift and sink over time."
    />
    <meta name="theme-color" content="#12040f" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main id="app" aria-label="Interactive vessel scene">
      <canvas
        id="sceneCanvas"
        aria-hidden="true"
      ></canvas>

      <button
        id="pasteReceiver"
        type="button"
        aria-label="Focus to paste a link into the vessel"
        title="Focus and paste a URL"
      ></button>

      <div
        id="subtleStatus"
        aria-hidden="true"
      ></div>

      <div
        id="liveRegion"
        class="sr-only"
        aria-live="polite"
        aria-atomic="true"
      ></div>

      <button
        id="muteToggle"
        type="button"
        aria-pressed="false"
        aria-label="Toggle sound"
        title="Toggle sound"
      >
        sound on
      </button>
    </main>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
