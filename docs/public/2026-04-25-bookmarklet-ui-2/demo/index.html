<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>AWW Bookmarklet Catalog</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        min-height: 100%;
        background: var(--demo-bg);
        color: #111720;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 14px;
      }

      :root {
        --demo-bg: #dfe4ec;
        --demo-surface: #f7f9fc;
        --demo-surface-strong: #ffffff;
        --demo-surface-inset: #e8edf4;
        --demo-line: #aeb8c6;
        --demo-line-soft: #ccd4df;
        --demo-muted: #526071;
        --demo-ink: #111720;
        --demo-blue: #1f5eae;
        --demo-space-1: 4px;
        --demo-space-2: 8px;
        --demo-space-3: 12px;
        --demo-space-4: 16px;
        --demo-space-5: 24px;
        --demo-space-6: 32px;
      }

      #catalog-root {
        min-height: 100vh;
      }

      .catalog-page {
        box-sizing: border-box;
        width: min(1440px, 100%);
        margin: 0 auto;
        padding: var(--demo-space-6);
      }

      .catalog-hero {
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(280px, 420px);
        gap: var(--demo-space-5);
        align-items: stretch;
        padding: var(--demo-space-5);
        border: 1px solid var(--demo-line);
        background: var(--demo-surface-strong);
        box-shadow: inset 0 0 0 3px #eef2f7;
      }

      .catalog-kicker,
      .section-label {
        margin: 0;
        color: var(--demo-muted);
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0;
        text-transform: uppercase;
      }

      .catalog-title {
        max-width: 760px;
        margin: 6px 0 0;
        font-size: 34px;
        line-height: 1.08;
        letter-spacing: 0;
      }

      .catalog-lede {
        max-width: 760px;
        margin: var(--demo-space-3) 0 0;
        color: #374151;
        font-size: 16px;
        line-height: 1.55;
      }

      .hero-console {
        display: grid;
        grid-template-rows: auto 1fr;
        min-height: 210px;
        border: 1px solid #232a33;
        background: var(--demo-surface-inset);
      }

      .hero-window-bar {
        display: grid;
        grid-template-columns: auto 1fr auto;
        gap: var(--demo-space-2);
        align-items: center;
        padding: var(--demo-space-2);
        border-bottom: 1px solid var(--demo-line);
        background: #f2f5f9;
        font-size: 12px;
      }

      .hero-window-bar span {
        width: 12px;
        height: 12px;
        border: 1px solid #232a33;
        background: #d8e8ff;
      }

      .hero-window-bar em {
        color: #236339;
        font-style: normal;
      }

      .hero-window-body {
        display: grid;
        grid-template-columns: 92px 1fr;
        gap: var(--demo-space-3);
        padding: var(--demo-space-3);
      }

      .hero-sidebar,
      .hero-panel {
        border: 1px solid var(--demo-line);
        background: #fff;
      }

      .hero-sidebar {
        display: grid;
        align-content: start;
        gap: var(--demo-space-2);
        padding: var(--demo-space-2);
      }

      .hero-sidebar span,
      .hero-line,
      .hero-grid span {
        display: block;
        min-height: 16px;
        background: #dce5f1;
        border: 1px solid #c1cbd8;
      }

      .hero-panel {
        display: grid;
        align-content: start;
        gap: var(--demo-space-3);
        padding: var(--demo-space-3);
      }

      .hero-line {
        width: 62%;
      }

      .hero-line--wide {
        width: 86%;
        background: #e7f2ea;
      }

      .hero-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: var(--demo-space-2);
      }

      .hero-actions {
        display: flex;
        flex-wrap: wrap;
        grid-column: 1 / -1;
        justify-content: start;
        gap: var(--demo-space-2);
      }

      .coverage-rail {
        display: flex;
        flex-wrap: wrap;
        gap: 1px;
        margin: var(--demo-space-4) 0 var(--demo-space-6);
        border: 1px solid var(--demo-line);
        background: var(--demo-line);
      }

      .coverage-rail span {
        flex: 1 1 160px;
        min-width: 0;
        padding: var(--demo-space-3);
        background: #f4f7fb;
        color: #3d4858;
        line-height: 1.35;
      }

      .coverage-rail strong {
        color: var(--demo-ink);
        font-size: 16px;
      }

      .catalog-section {
        display: grid;
        gap: var(--demo-space-4);
        margin-top: var(--demo-space-6);
      }

      .section-band {
        padding: var(--demo-space-5);
        border-top: 2px solid #8793a4;
        background: rgba(247, 249, 252, 0.58);
      }

      .section-heading {
        display: grid;
        grid-template-columns: minmax(0, 1fr);
        gap: var(--demo-space-2);
        max-width: 860px;
      }

      .section-heading h2 {
        margin: 4px 0 0;
        font-size: 23px;
        line-height: 1.2;
        letter-spacing: 0;
      }

      .section-heading p {
        margin: 0;
        color: var(--demo-muted);
        line-height: 1.5;
      }

      .specimen-grid {
        display: grid;
        grid-template-columns: repeat(12, minmax(0, 1fr));
        gap: var(--demo-space-4);
      }

      .specimen {
        min-width: 0;
        border: 1px solid var(--demo-line);
        background: var(--demo-surface);
      }

      .specimen--showcase {
        border-color: #8793a4;
        background: var(--demo-surface-strong);
        box-shadow: inset 0 3px 0 #d7e4f4;
      }

      .specimen--compact .specimen-body {
        gap: var(--demo-space-2);
      }

      .specimen--primary {
        box-shadow: inset 0 3px 0 var(--demo-blue);
      }

      .span-4 { grid-column: span 4; }
      .span-5 { grid-column: span 5; }
      .span-6 { grid-column: span 6; }
      .span-7 { grid-column: span 7; }
      .span-8 { grid-column: span 8; }
      .span-12 { grid-column: span 12; }

      .specimen-header {
        display: flex;
        justify-content: space-between;
        gap: var(--demo-space-3);
        padding: var(--demo-space-3) var(--demo-space-4);
        border-bottom: 1px solid var(--demo-line-soft);
        background: rgba(255, 255, 255, 0.68);
      }

      .specimen-title {
        margin: 0;
        font-size: 15px;
        line-height: 1.25;
      }

      .specimen-desc {
        margin: var(--demo-space-1) 0 0;
        color: var(--demo-muted);
        line-height: 1.45;
      }

      .specimen-tag {
        align-self: start;
        margin: 0;
        border: 1px solid var(--demo-line-soft);
        background: #eef3f9;
        color: #3c4a5b;
        padding: 3px 6px;
        font-size: 12px;
        font-weight: 700;
        white-space: nowrap;
      }

      .specimen-body {
        display: grid;
        gap: var(--demo-space-3);
        min-width: 0;
        padding: var(--demo-space-4);
      }

      .specimen-footer {
        border-top: 1px solid var(--demo-line-soft);
        padding: var(--demo-space-3) var(--demo-space-4);
        color: var(--demo-muted);
        font-size: 12px;
        line-height: 1.4;
      }

      .demo-row {
        display: flex;
        flex-wrap: wrap;
        gap: var(--demo-space-2);
        align-items: center;
      }

      .demo-stack {
        display: grid;
        gap: var(--demo-space-2);
        min-width: 0;
      }

      .demo-two-col {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: var(--demo-space-3);
      }

      .field-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
        gap: var(--demo-space-2);
      }

      .metric-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: var(--demo-space-3);
      }

      .surface-frame {
        position: relative;
        min-height: 150px;
        border: 1px solid var(--demo-line);
        background: #fff;
      }

      .browser-demo {
        min-height: 280px;
      }

      .browser-state-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: var(--demo-space-2);
      }

      .browser-state-grid .surface-frame {
        min-height: 120px;
      }

      .mini-browser-specimen {
        display: grid;
        grid-template-rows: auto auto minmax(180px, 1fr);
        min-height: 360px;
        border: 1px solid #232a33;
        background: #fff;
      }

      .mini-browser-content {
        position: relative;
        min-height: 180px;
        background: #eef2f7;
      }

      .mini-browser-page {
        display: grid;
        gap: var(--demo-space-3);
        padding: var(--demo-space-4);
      }

      .mini-browser-page h4,
      .mini-browser-page p {
        margin: 0;
      }

      .palette-dialog-body {
        display: grid;
        grid-template-columns: minmax(0, 1.1fr) minmax(220px, 0.9fr);
        gap: var(--demo-space-3);
      }

      .showcase-frame {
        border: 1px solid #232a33;
        background: #e4e9f1;
        padding: var(--demo-space-3);
      }

      .preview-duo,
      .command-showcase {
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(280px, 0.9fr);
        gap: var(--demo-space-3);
      }

      .rich-preview-frame {
        min-height: 280px;
      }

      .status-strip {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
        gap: var(--demo-space-2);
      }

      .state-matrix {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: var(--demo-space-2);
      }

      .state-cell {
        position: relative;
        min-height: 136px;
        border: 1px solid var(--demo-line);
        background: #fff;
      }

      .url-picker-showcase {
        display: grid;
        gap: var(--demo-space-3);
        border: 1px solid #232a33;
        background: #eef2f7;
        padding: var(--demo-space-3);
      }

      .command-showcase {
        align-items: start;
      }

      .mini-browser-columns {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: var(--demo-space-3);
      }

      .mini-browser-columns section {
        border: 1px solid var(--demo-line);
        background: #fff;
        padding: var(--demo-space-3);
      }

      .mini-browser-table {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        border: 1px solid var(--demo-line);
        background: #fff;
      }

      .mini-browser-table span {
        padding: 6px 8px;
        border-bottom: 1px solid var(--demo-line-soft);
      }

      .migration-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: var(--demo-space-3);
      }

      .migration-card {
        min-width: 0;
        border: 1px solid var(--demo-line);
        background: #fff;
        padding: var(--demo-space-3);
      }

      .migration-card h4,
      .migration-card p {
        margin: 0;
      }

      .migration-card p {
        margin-top: var(--demo-space-1);
        color: var(--demo-muted);
        line-height: 1.4;
      }

      .component-tags {
        display: flex;
        flex-wrap: wrap;
        gap: var(--demo-space-1);
        margin-top: var(--demo-space-2);
      }

      .component-tags span {
        border: 1px solid var(--demo-line-soft);
        background: #eef3f9;
        padding: 2px 5px;
        color: #39485a;
        font-size: 12px;
      }

      .token-strip {
        display: flex;
        flex-wrap: wrap;
        gap: var(--demo-space-1);
      }

      .token {
        border: 1px solid var(--demo-line-soft);
        background: #fff;
        padding: 4px 7px;
        color: #374151;
        font-family: ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace;
        font-size: 12px;
      }

      .callout {
        border-left: 3px solid #1f5eae;
        background: #eef5ff;
        padding: var(--demo-space-2) var(--demo-space-3);
        color: #243447;
        line-height: 1.45;
      }

      .inline-note {
        margin: 0;
        color: #586272;
        line-height: 1.45;
      }

      @media (max-width: 980px) {
        .catalog-page {
          padding: 20px;
        }

        .catalog-hero {
          grid-template-columns: 1fr;
          align-items: start;
        }

        .hero-actions {
          justify-content: start;
        }

        .section-band {
          padding: var(--demo-space-4);
        }

        .preview-duo,
        .command-showcase,
        .state-matrix {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .span-4,
        .span-5,
        .span-6,
        .span-7,
        .span-8 {
          grid-column: span 12;
        }
      }

      @media (max-width: 620px) {
        .catalog-page {
          padding: 14px;
        }

        .catalog-title {
          font-size: 27px;
        }

        .demo-two-col,
        .palette-dialog-body,
        .preview-duo,
        .command-showcase,
        .state-matrix,
        .migration-grid,
        .mini-browser-columns {
          grid-template-columns: 1fr;
        }

        .specimen-header {
          display: grid;
        }
      }
    </style>
  </head>
  <body>
    <div id="catalog-root"></div>
    <script type="module" src="../dist/demo/catalog.js"></script>
  </body>
</html>
