<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>AWW Bookmarklet Catalog</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        min-height: 100%;
        background: #e9edf3;
        color: #111720;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 14px;
      }

      #catalog-root {
        min-height: 100vh;
      }

      .catalog-page {
        box-sizing: border-box;
        width: min(1440px, 100%);
        margin: 0 auto;
        padding: 28px;
      }

      .catalog-hero {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 24px;
        align-items: end;
        padding: 0 0 22px;
        border-bottom: 1px solid #c3cad4;
      }

      .catalog-kicker,
      .section-label,
      .specimen-tag {
        margin: 0;
        color: #586272;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0;
        text-transform: uppercase;
      }

      .catalog-title {
        max-width: 760px;
        margin: 6px 0 0;
        font-size: 34px;
        line-height: 1.08;
        letter-spacing: 0;
      }

      .catalog-lede {
        max-width: 760px;
        margin: 12px 0 0;
        color: #374151;
        font-size: 16px;
        line-height: 1.55;
      }

      .hero-actions {
        display: flex;
        flex-wrap: wrap;
        justify-content: end;
        gap: 8px;
      }

      .catalog-summary {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 1px;
        margin: 18px 0 28px;
        border: 1px solid #c3cad4;
        background: #c3cad4;
      }

      .summary-item {
        min-width: 0;
        padding: 12px;
        background: #f8fafc;
      }

      .summary-value {
        display: block;
        font-size: 20px;
        font-weight: 750;
        line-height: 1.1;
      }

      .summary-label {
        display: block;
        margin-top: 4px;
        color: #586272;
        font-size: 12px;
        line-height: 1.35;
      }

      .catalog-section {
        display: grid;
        gap: 14px;
        margin-top: 28px;
      }

      .section-heading {
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(220px, 360px);
        gap: 24px;
        align-items: end;
      }

      .section-heading h2 {
        margin: 4px 0 0;
        font-size: 23px;
        line-height: 1.2;
        letter-spacing: 0;
      }

      .section-heading p {
        margin: 0;
        color: #4b5563;
        line-height: 1.5;
      }

      .specimen-grid {
        display: grid;
        grid-template-columns: repeat(12, minmax(0, 1fr));
        gap: 14px;
      }

      .specimen {
        min-width: 0;
        border: 1px solid #c3cad4;
        background: #f8fafc;
      }

      .span-4 { grid-column: span 4; }
      .span-5 { grid-column: span 5; }
      .span-6 { grid-column: span 6; }
      .span-7 { grid-column: span 7; }
      .span-8 { grid-column: span 8; }
      .span-12 { grid-column: span 12; }

      .specimen-header {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        padding: 12px 12px 10px;
        border-bottom: 1px solid #d5dbe4;
      }

      .specimen-title {
        margin: 0;
        font-size: 15px;
        line-height: 1.25;
      }

      .specimen-desc {
        margin: 4px 0 0;
        color: #586272;
        line-height: 1.45;
      }

      .specimen-body {
        display: grid;
        gap: 12px;
        min-width: 0;
        padding: 12px;
      }

      .demo-row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        align-items: center;
      }

      .demo-stack {
        display: grid;
        gap: 10px;
        min-width: 0;
      }

      .demo-two-col {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
      }

      .field-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
        gap: 10px;
      }

      .metric-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
        gap: 8px;
      }

      .surface-frame {
        position: relative;
        min-height: 150px;
        border: 1px solid #9ba5b3;
        background: #fff;
      }

      .browser-demo {
        min-height: 260px;
      }

      .browser-state-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 10px;
      }

      .browser-state-grid .surface-frame {
        min-height: 120px;
      }

      .mini-browser-specimen {
        display: grid;
        grid-template-rows: auto auto minmax(180px, 1fr);
        min-height: 320px;
        border: 1px solid #9ba5b3;
        background: #fff;
      }

      .mini-browser-content {
        position: relative;
        min-height: 180px;
        background:
          linear-gradient(#eef1f5, #eef1f5) padding-box,
          repeating-linear-gradient(0deg, #d5dbe4 0 1px, transparent 1px 28px);
      }

      .mini-browser-page {
        display: grid;
        gap: 10px;
        padding: 16px;
      }

      .mini-browser-page h4,
      .mini-browser-page p {
        margin: 0;
      }

      .palette-dialog-body {
        display: grid;
        grid-template-columns: minmax(0, 1.1fr) minmax(220px, 0.9fr);
        gap: 12px;
      }

      .tool-map {
        display: grid;
        gap: 8px;
      }

      .tool-map-row {
        display: grid;
        grid-template-columns: minmax(120px, 0.45fr) minmax(0, 1fr);
        gap: 10px;
        border-top: 1px solid #d5dbe4;
        padding-top: 8px;
      }

      .tool-map-row strong {
        overflow-wrap: anywhere;
      }

      .token-strip {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }

      .token {
        border: 1px solid #c3cad4;
        background: #fff;
        padding: 4px 7px;
        color: #374151;
        font-family: ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace;
        font-size: 12px;
      }

      .callout {
        border-left: 3px solid #1f5eae;
        background: #eef5ff;
        padding: 10px 12px;
        color: #243447;
        line-height: 1.45;
      }

      .inline-note {
        margin: 0;
        color: #586272;
        line-height: 1.45;
      }

      @media (max-width: 980px) {
        .catalog-page {
          padding: 20px;
        }

        .catalog-hero,
        .section-heading {
          grid-template-columns: 1fr;
          align-items: start;
        }

        .hero-actions {
          justify-content: start;
        }

        .catalog-summary {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .span-4,
        .span-5,
        .span-6,
        .span-7,
        .span-8 {
          grid-column: span 12;
        }
      }

      @media (max-width: 620px) {
        .catalog-page {
          padding: 14px;
        }

        .catalog-title {
          font-size: 27px;
        }

        .catalog-summary,
        .demo-two-col,
        .palette-dialog-body,
        .tool-map-row {
          grid-template-columns: 1fr;
        }

        .specimen-header {
          display: grid;
        }
      }
    </style>
  </head>
  <body>
    <div id="catalog-root"></div>
    <script type="module" src="../dist/demo/catalog.js"></script>
  </body>
</html>
