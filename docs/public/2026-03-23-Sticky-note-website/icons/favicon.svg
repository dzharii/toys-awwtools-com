<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-labelledby="title desc">
  <title id="title">Seattle Sticky Note Board icon</title>
  <desc id="desc">A warm sticky note pinned over a dark board surface.</desc>
  <defs>
    <linearGradient id="board" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2a4a4d"/>
      <stop offset="100%" stop-color="#183033"/>
    </linearGradient>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffe68a"/>
      <stop offset="100%" stop-color="#f0cb67"/>
    </linearGradient>
    <linearGradient id="fold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff4c4"/>
      <stop offset="100%" stop-color="#f1de9b"/>
    </linearGradient>
  </defs>
  <rect x="5" y="5" width="54" height="54" rx="12" fill="url(#board)"/>
  <rect x="8" y="8" width="48" height="48" rx="10" fill="none" stroke="#ffffff" stroke-opacity="0.12"/>
  <g transform="translate(33 33) rotate(-10)">
    <rect x="-16" y="-18" width="32" height="36" rx="5" fill="url(#paper)" stroke="#c69c3b" stroke-width="1"/>
    <path d="M9 -18h7v8z" fill="url(#fold)" stroke="#c69c3b" stroke-width="1" stroke-linejoin="round"/>
    <circle cx="0" cy="-12.5" r="3.5" fill="#d1664f"/>
    <rect x="-10" y="-4" width="18" height="3.2" rx="1.6" fill="#516164" opacity="0.75"/>
    <rect x="-10" y="3" width="14" height="3.2" rx="1.6" fill="#516164" opacity="0.58"/>
  </g>
</svg>
