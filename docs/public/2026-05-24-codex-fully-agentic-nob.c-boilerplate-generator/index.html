<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>nob.c Boilerplate Generator</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="topbar">
    <div>
      <h1>nob.c Boilerplate Generator</h1>
      <p>Configure a static, copy-ready starter for executable-focused <code>nob.h</code> projects.</p>
    </div>
    <div class="top-actions" aria-label="Output actions">
      <button id="copyButton" type="button">Copy</button>
      <button id="downloadButton" type="button">Download nob.c</button>
    </div>
  </header>

  <main class="workspace">
    <form id="configForm" class="controls" autocomplete="off">
      <section class="panel">
        <div class="panel-heading">
          <h2>Project</h2>
        </div>
        <label>
          <span>Project name</span>
          <input id="projectName" name="projectName" type="text" value="hello-nob" required>
        </label>
        <label>
          <span>Target name</span>
          <input id="targetName" name="targetName" type="text" value="hello" required>
        </label>
        <label>
          <span>Output directory</span>
          <input id="outputDir" name="outputDir" type="text" value="build">
        </label>
      </section>

      <section class="panel">
        <div class="panel-heading">
          <h2>Build</h2>
        </div>
        <label>
          <span>Compiler</span>
          <select id="compilerProfile" name="compilerProfile">
            <option value="cc">cc</option>
            <option value="gcc">gcc</option>
            <option value="clang">clang</option>
            <option value="tcc">tcc</option>
          </select>
        </label>
        <label>
          <span>Platform assumption</span>
          <select id="platform" name="platform">
            <option value="linux">Linux / Unix-like</option>
            <option value="macos">macOS</option>
            <option value="windows-mingw">Windows MinGW-style</option>
          </select>
        </label>
        <label>
          <span>Build profile</span>
          <select id="buildProfile" name="buildProfile">
            <option value="debug">Debug (-g -O0)</option>
            <option value="release">Release (-O2)</option>
          </select>
        </label>
        <label>
          <span>Warnings</span>
          <select id="warningProfile" name="warningProfile">
            <option value="basic">Basic (-Wall -Wextra)</option>
            <option value="strict">Strict (+ -Wpedantic)</option>
            <option value="none">None</option>
          </select>
        </label>
      </section>

      <section class="panel">
        <div class="panel-heading">
          <h2>Inputs</h2>
        </div>
        <label>
          <span>Source files</span>
          <textarea id="sources" name="sources" rows="4" spellcheck="false">src/main.c</textarea>
        </label>
        <label>
          <span>Include paths</span>
          <textarea id="includePaths" name="includePaths" rows="3" spellcheck="false"></textarea>
        </label>
        <label>
          <span>Library arguments</span>
          <textarea id="libraries" name="libraries" rows="3" spellcheck="false"></textarea>
        </label>
      </section>

      <section class="panel">
        <div class="panel-heading">
          <h2>Output Style</h2>
        </div>
        <label class="check-row">
          <input id="selfRebuild" name="selfRebuild" type="checkbox" checked>
          <span>Enable <code>NOB_GO_REBUILD_URSELF</code></span>
        </label>
        <label>
          <span>Comments</span>
          <select id="commentMode" name="commentMode">
            <option value="normal">Normal</option>
            <option value="compact">Compact</option>
          </select>
        </label>
        <button id="runChecksButton" type="button" class="secondary">Run fixture checks</button>
      </section>
    </form>

    <section class="preview-area" aria-label="Generated output">
      <div class="preview-header">
        <div>
          <h2>Generated nob.c</h2>
          <p id="statusLine">Ready</p>
        </div>
        <div class="pill-row" id="summaryPills" aria-label="Current configuration summary"></div>
      </div>
      <pre class="code-frame"><code id="codePreview"></code></pre>
    </section>

    <aside class="side-info" aria-label="Generator details">
      <section class="panel">
        <h2>Validation</h2>
        <ul id="validationList" class="message-list"></ul>
      </section>
      <section class="panel">
        <h2>Assumptions</h2>
        <ul id="assumptionsList" class="message-list"></ul>
      </section>
      <section class="panel">
        <h2>Bootstrap</h2>
        <pre class="mini-code"><code id="bootstrapCommand"></code></pre>
      </section>
      <section class="panel">
        <h2>Checks</h2>
        <p id="checksResult" class="checks-result">Not run.</p>
      </section>
    </aside>
  </main>

  <script src="script.js"></script>
</body>
</html>
