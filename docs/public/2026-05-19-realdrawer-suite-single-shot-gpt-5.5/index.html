<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>RealDrawer Suite</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app" class="app-shell">
    <header class="topbar">
      <div class="brand">
        <span class="brand-mark">RD</span>
        <span class="brand-title">RealDrawer Suite</span>
      </div>
      <nav class="top-actions" aria-label="Document actions">
        <button data-action="new">New</button>
        <button data-action="openProject">Open</button>
        <button data-action="saveProject">Save JSON</button>
        <button data-action="saveLocal">Save Local</button>
        <button data-action="loadLocal">Load Local</button>
        <button data-action="exportPng">Export PNG</button>
        <button data-action="exportSvg">Export SVG</button>
      </nav>
      <div class="status-strip">
        <span id="statusText">Ready</span>
        <span id="zoomText">100%</span>
      </div>
    </header>

    <aside class="left-rail" aria-label="Tools">
      <button class="tool active" data-tool="select" title="Select (V)">V</button>
      <button class="tool" data-tool="pan" title="Pan (M)">M</button>
      <button class="tool" data-tool="rect" title="Rectangle (R)">R</button>
      <button class="tool" data-tool="ellipse" title="Ellipse (O)">O</button>
      <button class="tool" data-tool="line" title="Line (L)">L</button>
      <button class="tool" data-tool="brush" title="Brush (B)">B</button>
      <button class="tool" data-tool="pencil" title="Pencil">P</button>
      <button class="tool" data-tool="marker" title="Marker">K</button>
      <button class="tool" data-tool="watercolor" title="Watercolor">W</button>
      <button class="tool" data-tool="oil" title="Oil Paint">I</button>
      <button class="tool" data-tool="text" title="Text (T)">T</button>
      <button class="tool" data-tool="image" title="Image">Img</button>
      <button class="tool" data-tool="eraser" title="Eraser">E</button>
    </aside>

    <main class="workspace">
      <div id="viewport" class="viewport" tabindex="0">
        <canvas id="canvas"></canvas>
        <div id="marquee" class="marquee hidden"></div>
      </div>
    </main>

    <aside class="right-panel">
      <section class="panel-section">
        <h2>Style</h2>
        <div class="control-grid">
          <label>Fill <input id="fillColor" type="color" value="#f0b65a"></label>
          <label>Fill 2 <input id="fillColor2" type="color" value="#783fd7"></label>
          <label>Stroke <input id="strokeColor" type="color" value="#1f2430"></label>
          <label>Shadow <input id="shadowColor" type="color" value="#000000"></label>
          <label>Type
            <select id="fillType">
              <option value="solid">Solid</option>
              <option value="linear">Linear gradient</option>
              <option value="radial">Radial gradient</option>
              <option value="material">Material</option>
              <option value="none">None</option>
            </select>
          </label>
          <label>Material
            <select id="material">
              <option value="plastic">Plastic</option>
              <option value="glass">Glass</option>
              <option value="chrome">Chrome</option>
              <option value="wood">Wood</option>
              <option value="paper">Paper</option>
              <option value="neon">Neon</option>
            </select>
          </label>
          <label>Stroke <input id="strokeWidth" type="range" min="0" max="80" value="3"></label>
          <label>Opacity <input id="opacity" type="range" min="0" max="100" value="100"></label>
          <label>Shadow blur <input id="shadowBlur" type="range" min="0" max="80" value="10"></label>
          <label>Shadow X <input id="shadowX" type="range" min="-80" max="80" value="8"></label>
          <label>Shadow Y <input id="shadowY" type="range" min="-80" max="80" value="10"></label>
          <label>Glow <input id="glow" type="range" min="0" max="80" value="0"></label>
          <label>Blur <input id="blur" type="range" min="0" max="30" value="0"></label>
          <label>Bevel <input id="bevel" type="range" min="0" max="30" value="5"></label>
          <label>Extrude <input id="extrude" type="range" min="0" max="80" value="0"></label>
          <label>Blend
            <select id="blendMode">
              <option value="source-over">Normal</option>
              <option value="multiply">Multiply</option>
              <option value="screen">Screen</option>
              <option value="overlay">Overlay</option>
              <option value="darken">Darken</option>
              <option value="lighten">Lighten</option>
              <option value="color-dodge">Dodge</option>
              <option value="color-burn">Burn</option>
            </select>
          </label>
          <label>Font size <input id="fontSize" type="number" min="6" max="300" value="54"></label>
        </div>
        <div class="button-row">
          <button data-action="applyPreset" data-preset="softCard">Soft card</button>
          <button data-action="applyPreset" data-preset="chromeBadge">Chrome</button>
          <button data-action="applyPreset" data-preset="neonGlow">Neon</button>
          <button data-action="applyPreset" data-preset="waterInk">Ink wash</button>
        </div>
      </section>

      <section class="panel-section">
        <h2>Object</h2>
        <div class="button-row">
          <button data-action="duplicate">Duplicate</button>
          <button data-action="deleteSelection">Delete</button>
          <button data-action="bringForward">Forward</button>
          <button data-action="sendBackward">Backward</button>
          <button data-action="smoothPath">Smooth</button>
          <button data-action="flattenSelection">Flatten</button>
        </div>
        <p id="selectionInfo" class="muted">No selection</p>
      </section>

      <section class="panel-section layers-section">
        <div class="section-title-row">
          <h2>Layers</h2>
          <div class="mini-actions">
            <button data-action="addLayer">+</button>
            <button data-action="duplicateLayer">Dup</button>
            <button data-action="deleteLayer">-</button>
          </div>
        </div>
        <div id="layersList" class="layers-list"></div>
        <div class="button-row">
          <button data-action="layerUp">Up</button>
          <button data-action="layerDown">Down</button>
        </div>
      </section>
    </aside>

    <input id="imageInput" type="file" accept="image/*" hidden />
    <input id="projectInput" type="file" accept="application/json,.json" hidden />
  </div>

  <script src="app.js"></script>
</body>
</html>
